name: Publish to PyPI

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag format
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re

          tag = os.environ["GITHUB_REF_NAME"]

          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
            raise SystemExit(
              f"Tag '{tag}' is invalid. Release tags must use the format v0.0.0."
            )

          print(f"Validated release tag {tag}; package version will be {tag[1:]}")
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distribution packages
        run: python -m build

      - name: Validate built package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import glob
          import os
          import tarfile

          expected_version = os.environ["GITHUB_REF_NAME"][1:]
          sdist_paths = glob.glob("dist/*.tar.gz")
          if not sdist_paths:
            raise SystemExit("No source distribution was built.")

          with tarfile.open(sdist_paths[0], "r:gz") as archive:
            pkg_info_member = next(member for member in archive.getmembers() if member.name.endswith("PKG-INFO"))
            with archive.extractfile(pkg_info_member) as pkg_info:
              lines = pkg_info.read().decode().splitlines()

          actual_version = next(
            (line.partition(": ")[2] for line in lines if line.startswith("Version: ")),
            None,
          )

          if actual_version != expected_version:
            raise SystemExit(
              f"Built package version '{actual_version}' does not match expected version '{expected_version}'."
            )

          print(f"Validated built package version {actual_version}")
          PY

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
